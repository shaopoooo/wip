# 正式環境專用
# 啟動：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ENV_FILE 未設定時預設 .env，可覆寫：ENV_FILE=.env.staging docker compose -f ... up -d
#
# SSL 首次設定：
#   1. 先用 nginx.conf (HTTP only) 啟動，讓 certbot 取得證書
#   2. docker compose -f ... run --rm certbot certonly --webroot -w /var/www/certbot -d wip.yourfactory.com --cert-name wip --agree-tos -m admin@yourfactory.com
#   3. 改用 nginx.ssl.conf 並重啟 nginx

services:
  db:
    env_file: ${ENV_FILE:-.env}
    restart: unless-stopped

  backend:
    env_file: ${ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    restart: unless-stopped
    volumes:
      - /ref:/ref:ro

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 首次用 nginx.conf，取得證書後改為 nginx.ssl.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # 自動續期：每 12 小時檢查，到期前 30 天自動 renew
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 43200 & wait $${!}; done'
    restart: unless-stopped

volumes:
  certbot_webroot:
  certbot_certs:
