# 正式環境專用
# 啟動：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ENV_FILE 未設定時預設 .env，可覆寫：ENV_FILE=.env.staging docker compose -f ... up -d

services:
  db:
    env_file: ${ENV_FILE:-.env}
    restart: unless-stopped

  backend:
    env_file: ${ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    restart: unless-stopped

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
