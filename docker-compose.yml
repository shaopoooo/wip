# 共用基礎設定 — Dev 和 Prod 共同的部分
# Dev:  docker compose up -d                                                          (自動合併 override.yml)
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不在 base 使用 ${VAR} 插值讀取 credentials
    # credentials 由各環境的 env_file 注入（override.yml / prod.yml）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]   # 不依賴 ${VAR}，直接檢查本地 postgres
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
