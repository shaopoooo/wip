# 開發環境專用 — 執行 docker compose up -d 時自動合併
# ENV_FILE 未設定時預設 .env.dev，可覆寫：ENV_FILE=.env.other docker compose up -d

services:
  db:
    env_file: ${ENV_FILE:-.env.dev}
    ports:
      - "5432:5432" # 對外開放，方便 TablePlus / psql 直連
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data # 使用獨立 volume，不污染 prod
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      target: builder # builder stage 含 ts-node + nodemon
    env_file: ${ENV_FILE:-.env.dev}
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000" # 對外開放，方便 Postman / 瀏覽器直連
    volumes:
      - ./backend/src:/app/src:ro # hot reload
      - ./backend/drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./migrations:/migrations
      - ./ref:/ref:ro # ref 資料供 seed 使用
    command: sh -c "npm run migrate && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    env_file: ${ENV_FILE:-.env.dev}
    environment:
      - VITE_API_URL=http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
    depends_on:
      - backend

volumes:
  postgres_data_dev:
